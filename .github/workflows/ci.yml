name: ci

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Create local env file for smoke tests
        run: |
          cat > .env.local <<'EOF'
          ADMIN_USERNAME=operator
          ADMIN_PASSWORD=operator
          ADMIN_SESSION_SECRET=ci-session-secret
          ADMIN_SESSION_COOKIE_SECURE=false
          EOF

      - name: Backend smoke
        run: npm run test:backend

      - name: HTTP smoke
        run: npm run test:http
